################
### MONITORS ###
################

#name, resolution, position, scale
monitor=,2560x1440@240,0x0,1, bitdepth,10, sdrbrightness,1.4, sdrsaturation,0.98
render {
    cm_fs_passthrough = true
  }
env = WLR_USE_DAMAGE,1


###################
### MY PROGRAMS ###
###################

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$hyprHome = $HOME/.config/hypr
$hyprBin = $hyprHome/bin
$menu = $hyprBin/menu


#################
### AUTOSTART ###
#################

exec-once = waybar & hyprpaper
exec-once = fcitx5 -d
exec-once = hyprswitch init --show-title &
exec-once = vicinae server


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = SDL_VIDEO_DRIVER,x11
env = _JAVA_AWT_WM_NONREPARENTING,1

env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5ct

env = GDK_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# env = AMD_VULKAN_ICD,RADV

# env = GTK_IM_MODULE,fcitx
env = QT_IM_MODULE,fcitx

#####################
### LOOK AND FEEL ###
#####################

general { 
    gaps_in = 4
    gaps_out = 8

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false 

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 6

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1
        
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    repeat_delay = 250
    repeat_rate = 40

    follow_mouse = 0

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    force_no_accel = false

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    # workspace_swipe = false
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = realtek-mchose-a7-ultra(re)
    sensitivity = -0.7
}


####################
### KEYBINDINGSS ###
####################

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, M, submap, move

submap = move
bind = , l, movewindow, r
bind = , h, movewindow, l
bind = , j, movewindow, d
bind = , k, movewindow, u
bind = , l, submap, reset
bind = , h, submap, reset
bind = , j, submap, reset
bind = , k, submap, reset
bind = , escape, submap, reset
bind = , catchall, submap, reset
submap = reset

bind = $mainMod SHIFT, R, submap, resize

submap = resize
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , j, resizeactive, 0 10
binde = , k, resizeactive, 0 -10
bind = , escape, submap, reset
bind = , catchall, submap, reset
submap = reset

bind = $mainMod, R, submap, run

submap = run
bind = , S, exec, $menu/steam.sh
bind = , S, submap, reset
bind = , escape, submap, reset
bind = , catchall, submap, reset
submap = reset


# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# bind = $mainMod, space, exec, wofi --show drun
bind = $mainMod, space, exec, vicinae toggle
bind = $mainMod SHIFT, space, exec, wofi --show run
bind = $mainMod, C, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod CTRL, Q, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, /, togglesplit, # dwindle
bind = $mainMod, F, fullscreen, 0

# toggle input methods
bind = $mainMod CTRL, I, exec, $hyprBin/input.sh

# screenshot
bind = $mainMod CTRL SHIFT, 3, exec, hyprshot -m output --freeze -o ~/Pictures/Screenshots
bind = $mainMod CTRL SHIFT, 4, exec, hyprshot -m region --freeze -o ~/Pictures/Screenshots
bind = , Print, exec, hyprshot -m active -m output --freeze -o ~/Pictures/Screenshots

# recording
bind = $mainMod CTRL, 0, exec, $hyprBin/obs/start_recording
bind = $mainMod CTRL, minus, exec, $hyprBin/obs/stop_recording

# hyprswitch
$mod = alt
$key = tab
$reverse = grave
bind = $mod, $key, exec, hyprswitch gui --mod-key $mod --key $key --close mod-key-release --reverse-key=key=$reverse --sort-recent && hyprswitch dispatch
bind = $mod $reverse, $key, exec, hyprswitch gui --mod-key $mod --key $key --close mod-key-release --reverse-key=key=$reverse --sort-recent && hyprswitch dispatch -r
# Cycle windows with mainMod + tab
bind = $mainMod, tab, cyclenext
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Minimize
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod, S, movetoworkspace, +0
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod, S, movetoworkspace, special:magic
# bind = $mainMod, S, togglespecialworkspace, magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = match:float, ^(kitty)$

# Example windowrule v2
# windowrule = match:float,class:^(kitty)$,title:^(kitty)$

windowrule = match:class .*, suppress_event maximize  # You'll probably like this.
# PiP
windowrule = match:title ^(Picture-in-Picture)$, float true
# firefox noti, extension
windowrule = match:class ^firefox$, match:title ^$, float true
windowrule = match:class ^firefox$, match:title ^$, move 50%-w 0
windowrule = match:class ^firefox$, match:title ^$, suppress_event activatefocus

windowrule = match:class ^mpv$, float true

# flameshot
windowrule = match:class ^(flameshot)$, float true
windowrule = match:class ^(flameshot)$, move 0 0
windowrule = match:class ^(flameshot)$, pin true
windowrule = match:class ^(net.lutris.Lutris)$, float true

# steam
windowrule = match:initial_class ^steam$, no_initial_focus true
windowrule = match:class ^steam$, workspace 4
# steam games
$games = dota2|steam_app_\d+
windowrule = match:class ^($games)$, workspace 3
windowrule = match:initial_class ^($games)$, workspace 3

# wwm
windowrule = match:class ^steam_app_3564740$, match:title ^Where Winds Meet$, workspace 3 fullscreen true
# windowrule = match:initial_title ^wwm.exe$, workspace 3 fullscreen true
# windowrule = match:initial_class ^steam_app_default$, workspace 3
# windowrule = match:initial_title ^燕雲十六聲$, workspace 3

# poe2 + ee2
$poe2 = title ^(Path of Exile 2)$
$ee2 = class ^(exiled-exchange-2)$
windowrule = match:$poe2, workspace 4
# windowrule = match:$ee2, float
# windowrule = match:$ee2, pin
# windowrule = match:$ee2, noblur
# windowrule = match:$ee2, pin

# zen
$zen = class ^zen-alpha$
# windowrule = match:float, workspace:4
windowrule = match:$zen, size 50% 80%

# vicinae
layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}
# disable animation for vicinae only
layerrule {
    name = vicinae-no-animation
    no_anim = on
    match:namespace = vicinae
}
